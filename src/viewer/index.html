<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trellis</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --border: #0f3460;
  --text: #e0e0e0;
  --text-dim: #8888aa;
  --accent: #e94560;
  --status-draft: #f0c040;
  --status-not-started: #888;
  --status-in-progress: #4a9eff;
  --status-done: #40c057;
  --status-blocked: #e94560;
  --status-archived: #666;
  --group-bg: rgba(255,255,255,0.03);
  --group-border: rgba(255,255,255,0.1);
  --drawer-width: 420px;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --border: #ddd;
    --text: #222;
    --text-dim: #666;
    --accent: #d63031;
    --status-draft: #e67e22;
    --status-not-started: #95a5a6;
    --status-in-progress: #2980b9;
    --status-done: #27ae60;
    --status-blocked: #e74c3c;
    --status-archived: #7f8c8d;
    --group-bg: rgba(0,0,0,0.03);
    --group-border: rgba(0,0,0,0.15);
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
}
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
header h1 {
  font-size: 18px;
  font-weight: 600;
}
header h1 span { color: var(--text-dim); font-weight: 400; }
.toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
}
select, button {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: 4px;
  font-size: 13px;
  cursor: pointer;
}
button:hover { border-color: var(--accent); }
#main {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}
#canvas-wrap {
  flex: 1;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
svg {
  width: 100%;
  height: 100%;
}
.node rect {
  rx: 6;
  ry: 6;
  stroke-width: 2;
  cursor: pointer;
  transition: stroke-width 0.15s;
}
.node rect:hover { stroke-width: 3; }
.node.selected rect { stroke-width: 3; stroke-dasharray: 4 2; }
.node text {
  font-family: inherit;
  font-size: 12px;
  fill: var(--text);
}
.node .status-badge {
  font-size: 10px;
  fill: var(--text-dim);
}
.node .tag-line {
  font-size: 9px;
  fill: var(--text-dim);
}
.group rect {
  rx: 8;
  ry: 8;
  fill: var(--group-bg);
  stroke: var(--group-border);
  stroke-width: 1;
  stroke-dasharray: 4 3;
}
.group text {
  font-family: inherit;
  font-size: 11px;
  fill: var(--text-dim);
  font-weight: 600;
}
.edge path {
  fill: none;
  stroke: var(--border);
  stroke-width: 1.5;
}
.edge marker path { fill: var(--border); }

/* Side drawer */
#drawer {
  width: 0;
  overflow: hidden;
  background: var(--surface);
  border-left: 1px solid var(--border);
  transition: width 0.2s ease;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
#drawer.open {
  width: var(--drawer-width);
}
#drawer-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#drawer-header h3 {
  font-size: 16px;
  margin-bottom: 6px;
}
#drawer-header .meta {
  color: var(--text-dim);
  font-size: 12px;
  margin-bottom: 4px;
}
#drawer-header .deps {
  margin-top: 8px;
  font-size: 12px;
}
#drawer-header .dep-item {
  margin-left: 12px;
  margin-top: 2px;
}
.dep-done { color: var(--status-done); }
.dep-pending { color: var(--status-blocked); }
#drawer-close {
  position: absolute;
  top: 10px;
  right: 10px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  line-height: 1;
}
#drawer-close:hover { color: var(--text); }
#drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  font-size: 14px;
  line-height: 1.6;
}
/* Rendered markdown styles */
#drawer-body h1 { font-size: 20px; margin: 16px 0 8px; font-weight: 600; }
#drawer-body h2 { font-size: 17px; margin: 14px 0 6px; font-weight: 600; }
#drawer-body h3 { font-size: 15px; margin: 12px 0 4px; font-weight: 600; }
#drawer-body h4 { font-size: 14px; margin: 10px 0 4px; font-weight: 600; }
#drawer-body p { margin: 0 0 10px; }
#drawer-body ul, #drawer-body ol { margin: 0 0 10px; padding-left: 24px; }
#drawer-body li { margin-bottom: 3px; }
#drawer-body pre {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 12px;
  overflow-x: auto;
  margin: 0 0 10px;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 12px;
  line-height: 1.5;
}
#drawer-body code {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 12px;
  background: var(--bg);
  padding: 2px 5px;
  border-radius: 3px;
}
#drawer-body pre code {
  background: none;
  padding: 0;
}
#drawer-body blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  color: var(--text-dim);
  margin: 0 0 10px;
}
#drawer-body hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 12px 0;
}
#drawer-body a { color: var(--status-in-progress); }
#drawer-body strong { font-weight: 600; }
#drawer-body em { font-style: italic; }
#drawer-body img { max-width: 100%; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Trellis <span id="project-name"></span></h1>
    <div class="toolbar">
      <select id="group-by">
        <option value="">No grouping</option>
        <option value="tag">Group by tag</option>
        <option value="repo">Group by repo</option>
      </select>
      <select id="filter-status"><option value="">All statuses</option></select>
      <select id="filter-tag"><option value="">All tags</option></select>
      <select id="filter-repo"><option value="">All repos</option></select>
      <button id="btn-refresh" title="Refresh">&#8635; Refresh</button>
    </div>
  </header>
  <div id="main">
    <div id="canvas-wrap">
      <svg id="svg"></svg>
    </div>
    <div id="drawer">
      <div id="drawer-header" style="position:relative">
        <button id="drawer-close">&times;</button>
        <h3 id="drawer-title"></h3>
        <div id="drawer-meta"></div>
      </div>
      <div id="drawer-body"></div>
    </div>
  </div>
</div>
<script>
/* __DAGRE_BUNDLE__ */
</script>
<script>
(function() {
  var DATA = __TRELLIS_DATA__;

  var statusColors = {
    draft: getComputedStyle(document.documentElement).getPropertyValue('--status-draft').trim(),
    not_started: getComputedStyle(document.documentElement).getPropertyValue('--status-not-started').trim(),
    in_progress: getComputedStyle(document.documentElement).getPropertyValue('--status-in-progress').trim(),
    done: getComputedStyle(document.documentElement).getPropertyValue('--status-done').trim(),
    archived: getComputedStyle(document.documentElement).getPropertyValue('--status-archived').trim(),
    blocked: getComputedStyle(document.documentElement).getPropertyValue('--status-blocked').trim(),
  };

  var selected = null;

  function init() {
    document.getElementById('project-name').textContent = '— ' + DATA.project;
    populateFilters();
    render();
    document.getElementById('btn-refresh').addEventListener('click', refresh);
    document.getElementById('filter-status').addEventListener('change', render);
    document.getElementById('filter-tag').addEventListener('change', render);
    document.getElementById('filter-repo').addEventListener('change', render);
    document.getElementById('group-by').addEventListener('change', render);
    document.getElementById('drawer-close').addEventListener('click', closeDrawer);
  }

  function populateFilters() {
    var statuses = new Set();
    var tags = new Set();
    var repos = new Set();
    DATA.plans.forEach(function(p) {
      statuses.add(p.status);
      if (p.blocked) statuses.add('blocked');
      (p.tags || []).forEach(function(t) { tags.add(t); });
      if (p.repo) repos.add(p.repo);
    });

    var selStatus = document.getElementById('filter-status');
    statuses.forEach(function(s) {
      var opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      selStatus.appendChild(opt);
    });

    var selTag = document.getElementById('filter-tag');
    tags.forEach(function(t) {
      var opt = document.createElement('option');
      opt.value = t; opt.textContent = t;
      selTag.appendChild(opt);
    });

    var selRepo = document.getElementById('filter-repo');
    repos.forEach(function(r) {
      var opt = document.createElement('option');
      opt.value = r; opt.textContent = r;
      selRepo.appendChild(opt);
    });
  }

  function getFilteredPlans() {
    var statusFilter = document.getElementById('filter-status').value;
    var tagFilter = document.getElementById('filter-tag').value;
    var repoFilter = document.getElementById('filter-repo').value;

    return DATA.plans.filter(function(p) {
      if (statusFilter) {
        if (statusFilter === 'blocked') {
          if (!p.blocked) return false;
        } else if (p.status !== statusFilter) return false;
      }
      if (tagFilter && !(p.tags || []).includes(tagFilter)) return false;
      if (repoFilter && p.repo !== repoFilter) return false;
      return true;
    });
  }

  function render() {
    var plans = getFilteredPlans();
    var planIds = new Set(plans.map(function(p) { return p.id; }));
    var groupBy = document.getElementById('group-by').value;

    var g = new dagre.graphlib.Graph({ compound: !!groupBy });
    g.setGraph({ rankdir: 'TB', nodesep: 30, ranksep: 50, marginx: 40, marginy: 40 });
    g.setDefaultEdgeLabel(function() { return {}; });

    // Create group parent nodes if grouping is active
    var groups = new Set();
    if (groupBy) {
      plans.forEach(function(p) {
        var vals = groupBy === 'tag' ? (p.tags || []) : (p.repo ? [p.repo] : []);
        vals.forEach(function(v) { groups.add(v); });
      });
      groups.forEach(function(grp) {
        var gid = '__group__' + grp;
        g.setNode(gid, { label: grp, isGroup: true, width: 0, height: 0 });
      });
    }

    plans.forEach(function(p) {
      var label = p.title || p.id.split('/').pop();
      if (label.length > 20) label = label.substring(0, 18) + '..';
      var hasTags = p.tags && p.tags.length > 0;
      var nodeHeight = hasTags ? 65 : 50;
      g.setNode(p.id, { label: label, width: 160, height: nodeHeight, plan: p });

      if (groupBy) {
        var vals = groupBy === 'tag' ? (p.tags || []) : (p.repo ? [p.repo] : []);
        if (vals.length > 0) {
          g.setParent(p.id, '__group__' + vals[0]);
        }
      }
    });

    plans.forEach(function(p) {
      (p.depends_on || []).forEach(function(dep) {
        if (planIds.has(dep)) {
          g.setEdge(dep, p.id);
        }
      });
    });

    dagre.layout(g);

    var svg = document.getElementById('svg');
    var graph = g.graph();
    var gw = graph.width || 400;
    var gh = graph.height || 300;
    svg.setAttribute('viewBox', '0 0 ' + gw + ' ' + gh);
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

    var html = '';

    // Defs for arrow markers
    html += '<defs><marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="' + getComputedStyle(document.documentElement).getPropertyValue('--border').trim() + '"/></marker></defs>';

    // Group backgrounds
    if (groupBy) {
      g.nodes().forEach(function(nid) {
        var node = g.node(nid);
        if (!node.isGroup) return;
        var children = g.children(nid);
        if (!children || children.length === 0) return;

        var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        children.forEach(function(cid) {
          var cn = g.node(cid);
          minX = Math.min(minX, cn.x - cn.width / 2);
          minY = Math.min(minY, cn.y - cn.height / 2);
          maxX = Math.max(maxX, cn.x + cn.width / 2);
          maxY = Math.max(maxY, cn.y + cn.height / 2);
        });

        var pad = 16;
        html += '<g class="group">';
        html += '<rect x="' + (minX - pad) + '" y="' + (minY - pad - 16) + '" width="' + (maxX - minX + pad * 2) + '" height="' + (maxY - minY + pad * 2 + 16) + '"/>';
        html += '<text x="' + (minX - pad + 8) + '" y="' + (minY - pad - 2) + '">' + escapeHtml(node.label) + '</text>';
        html += '</g>';
      });
    }

    // Edges
    g.edges().forEach(function(e) {
      var edge = g.edge(e);
      var points = edge.points;
      var d = 'M ' + points[0].x + ' ' + points[0].y;
      for (var i = 1; i < points.length; i++) {
        d += ' L ' + points[i].x + ' ' + points[i].y;
      }
      html += '<g class="edge"><path d="' + d + '" marker-end="url(#arrow)"/></g>';
    });

    // Nodes
    g.nodes().forEach(function(nid) {
      var node = g.node(nid);
      if (node.isGroup) return;
      var p = node.plan;
      var color = p.blocked ? statusColors.blocked : (statusColors[p.status] || statusColors.not_started);
      var x = node.x - node.width / 2;
      var y = node.y - node.height / 2;
      var cls = 'node' + (selected === p.id ? ' selected' : '');
      var hasTags = p.tags && p.tags.length > 0;

      html += '<g class="' + cls + '" data-id="' + p.id + '" transform="translate(0,0)">';
      html += '<rect x="' + x + '" y="' + y + '" width="' + node.width + '" height="' + node.height + '" fill="' + getComputedStyle(document.documentElement).getPropertyValue('--surface').trim() + '" stroke="' + color + '"/>';
      html += '<text x="' + node.x + '" y="' + (node.y - (hasTags ? 10 : 4)) + '" text-anchor="middle">' + escapeHtml(node.label) + '</text>';
      html += '<text class="status-badge" x="' + node.x + '" y="' + (node.y + (hasTags ? 4 : 14)) + '" text-anchor="middle" fill="' + color + '">' + (p.blocked ? 'blocked' : p.status) + '</text>';
      if (hasTags) {
        var tagStr = p.tags.join(', ');
        if (tagStr.length > 22) tagStr = tagStr.substring(0, 20) + '..';
        html += '<text class="tag-line" x="' + node.x + '" y="' + (node.y + 18) + '" text-anchor="middle">' + escapeHtml(tagStr) + '</text>';
      }
      html += '</g>';
    });

    svg.innerHTML = html;

    // Click handlers
    svg.querySelectorAll('.node').forEach(function(el) {
      el.addEventListener('click', function() {
        var id = el.getAttribute('data-id');
        selectPlan(id);
      });
    });
  }

  function closeDrawer() {
    selected = null;
    document.getElementById('drawer').classList.remove('open');
    render();
  }

  function selectPlan(id) {
    selected = id;
    var plan = DATA.plans.find(function(p) { return p.id === id; });
    if (!plan) return;

    // Title
    document.getElementById('drawer-title').textContent = plan.title;

    // Meta header
    var statusLabel = plan.blocked ? plan.status + ' (blocked)' : plan.status;
    var tagsStr = (plan.tags || []).join(', ');

    var h = '<div class="meta">' + escapeHtml(plan.id) + ' &middot; ' + statusLabel;
    if (tagsStr) h += ' &middot; ' + escapeHtml(tagsStr);
    if (plan.repo) h += ' &middot; [' + escapeHtml(plan.repo) + ']';
    h += '</div>';

    if (plan.filePath) {
      h += '<div class="meta">Path: ' + escapeHtml(plan.filePath) + '</div>';
    }

    if (plan.depends_on && plan.depends_on.length) {
      h += '<div class="deps"><strong>Depends on:</strong>';
      plan.depends_on.forEach(function(dep) {
        var depPlan = DATA.plans.find(function(p) { return p.id === dep; });
        var cls = depPlan && depPlan.status === 'done' ? 'dep-done' : 'dep-pending';
        var icon = depPlan && depPlan.status === 'done' ? '&#10003;' : '&#10007;';
        var status = depPlan ? depPlan.status : 'not found';
        h += '<div class="dep-item ' + cls + '">' + icon + ' ' + escapeHtml(dep) + ' (' + status + ')</div>';
      });
      h += '</div>';
    }

    var blocks = DATA.plans.filter(function(p) {
      return (p.depends_on || []).includes(id);
    });
    if (blocks.length) {
      h += '<div class="deps"><strong>Blocks:</strong>';
      blocks.forEach(function(b) {
        h += '<div class="dep-item">' + escapeHtml(b.id) + '</div>';
      });
      h += '</div>';
    }

    document.getElementById('drawer-meta').innerHTML = h;

    // Render plan body as markdown
    var body = plan.body || '';
    var drawerBody = document.getElementById('drawer-body');
    drawerBody.innerHTML = renderMarkdown(body);
    drawerBody.scrollTop = 0;

    document.getElementById('drawer').classList.add('open');
    render();
  }

  // Lightweight markdown renderer
  function renderMarkdown(src) {
    var lines = src.split('\n');
    var html = '';
    var inCodeBlock = false;
    var codeContent = '';
    var inList = false;
    var listType = '';

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];

      // Fenced code blocks
      if (line.match(/^```/)) {
        if (inCodeBlock) {
          html += '<pre><code>' + escapeHtml(codeContent) + '</code></pre>';
          codeContent = '';
          inCodeBlock = false;
        } else {
          if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
          inCodeBlock = true;
        }
        continue;
      }
      if (inCodeBlock) {
        codeContent += (codeContent ? '\n' : '') + line;
        continue;
      }

      // Blank line — close list, add spacing
      if (line.trim() === '') {
        if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
        continue;
      }

      // Headings
      var headingMatch = line.match(/^(#{1,4})\s+(.+)/);
      if (headingMatch) {
        if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
        var level = headingMatch[1].length;
        html += '<h' + level + '>' + inlineMarkdown(headingMatch[2]) + '</h' + level + '>';
        continue;
      }

      // Horizontal rule
      if (line.match(/^(-{3,}|\*{3,}|_{3,})\s*$/)) {
        if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
        html += '<hr>';
        continue;
      }

      // Blockquote
      if (line.match(/^>\s?/)) {
        if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
        html += '<blockquote>' + inlineMarkdown(line.replace(/^>\s?/, '')) + '</blockquote>';
        continue;
      }

      // Unordered list
      var ulMatch = line.match(/^(\s*)[-*+]\s+(.+)/);
      if (ulMatch) {
        if (!inList || listType !== 'ul') {
          if (inList) html += listType === 'ul' ? '</ul>' : '</ol>';
          html += '<ul>';
          inList = true;
          listType = 'ul';
        }
        html += '<li>' + inlineMarkdown(ulMatch[2]) + '</li>';
        continue;
      }

      // Ordered list
      var olMatch = line.match(/^(\s*)\d+[.)]\s+(.+)/);
      if (olMatch) {
        if (!inList || listType !== 'ol') {
          if (inList) html += listType === 'ul' ? '</ul>' : '</ol>';
          html += '<ol>';
          inList = true;
          listType = 'ol';
        }
        html += '<li>' + inlineMarkdown(olMatch[2]) + '</li>';
        continue;
      }

      // Paragraph
      if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
      html += '<p>' + inlineMarkdown(line) + '</p>';
    }

    if (inCodeBlock) {
      html += '<pre><code>' + escapeHtml(codeContent) + '</code></pre>';
    }
    if (inList) {
      html += listType === 'ul' ? '</ul>' : '</ol>';
    }

    return html;
  }

  function inlineMarkdown(text) {
    // Code spans (must be first to avoid processing inside them)
    text = text.replace(/`([^`]+)`/g, function(m, c) {
      return '<code>' + escapeHtml(c) + '</code>';
    });
    // Images
    text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
    // Links
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    // Bold
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/__([^_]+)__/g, '<strong>$1</strong>');
    // Italic
    text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    text = text.replace(/_([^_]+)_/g, '<em>$1</em>');
    return text;
  }

  function refresh() {
    fetch('/api/data')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        DATA = data;
        selected = null;
        document.getElementById('drawer').classList.remove('open');
        render();
      })
      .catch(function(err) {
        console.error('Refresh failed:', err);
      });
  }

  function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  init();
})();
</script>
</body>
</html>
